# !! PRIVILEGED GROUND-TRUTH CONTEXT — DO NOT FEED TO THE AGENT !!
# These IOCs come from the Protocol SIFT case template. The agent must
# rediscover them from the evidence to score on accuracy. SIFT-OWL's
# eval harness reads these only at scoring time, never at run time.
ground_truth_iocs:
  malware:
    - { indicator: "STUN.exe",      type: malware_binary,
        location:  "C:\\Windows\\System32\\STUN.exe",
        host:      rd01,
        pid:       1912,
        parent:    "svchost.exe (PID 1244)" }
    - { indicator: "msedge.exe (masquerading)", type: malware_binary_masquerade,
        instances: 7, parents: ["STUN.exe", "explorer.exe"],
        classification: "Trojan:Win32/PowerRunner.A",
        notes: "Microsoft Edge masquerade" }
    - { indicator: "pssdnsvc.exe",  type: suspicious_service,
        location: "C:\\Windows\\",
        notes: "name/path mismatch for PsShutdown" }
    - { indicator: "atmfd.dll",     type: missing_driver,
        notes: "in Autoruns but absent from filesystem" }
  attacker_activity:
    - { event: "Lateral movement",
        cmd: "net use H: \\\\172.16.6.12\\c$\\Users",
        process: "net.exe (PID 9128)" }
    - { event: "Execution chain",
        chain: "STUN.exe (scheduled task) → svchost.exe → taskhostw.exe" }
    - { event: "Defender evasion",
        notes: "msedge.exe masquerading; Defender detected + terminated repeatedly" }
  timeline:
    - { ts_utc: "2023-01-24T??:??:??Z", event: "Incident declared; F-Response agents deployed" }
    - { ts_utc: "2023-01-25T14:52:04Z", event: "Lateral movement (net use H: \\\\172.16.6.12\\c$\\Users)" }
    - { ts_utc: "2023-01-25T14:56:42Z..2023-01-25T15:04:43Z", event: "msedge.exe PIDs spawned" }
    - { ts_utc: "2023-01-25T15:00:56Z", event: "msedge.exe PID 2524 active at memory capture time" }
    - { ts_utc: "2023-01-29T12:23:16Z", event: "Kansa post-intrusion collection (Autorunsc timestamp)" }

