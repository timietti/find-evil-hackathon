# FOR508 lab questions for SHIELDBASE.
goals:
  - { id: G1, question: "Identify the primary compromise host and initial access vector." }
  - { id: G2, question: "Identify all malware implants and their persistence mechanisms." }
  - { id: G3, question: "Map lateral movement across SHIELDBASE — which hosts were touched, in what order?" }
  - { id: G4, question: "What credentials were stolen / abused, and from which host?" }
  - { id: G5, question: "What data was staged or exfiltrated, and how?" }
  - { id: G6, question: "Build a unified UTC timeline across all evidence sources." }
  - { id: G7, question: "Attribute the activity to a known TTP class (CRIMSON OSPREY signal)." }

