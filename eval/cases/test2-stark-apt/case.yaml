# once we read the FOR508-Workbook_Commands/exercise_*.* prompts.
goals:
  - { id: G1, question: "Identify the initial compromise vector and host." }
  - { id: G2, question: "Map lateral movement across the four hosts." }
  - { id: G3, question: "Identify implants / persistence mechanisms (process, service, scheduled task, registry)." }
  - { id: G4, question: "Identify exfiltration: what was staged, packaged, and where it went." }
  - { id: G5, question: "Build the unified incident timeline (UTC) across all four hosts." }
  - { id: G6, question: "Identify the credential-theft mechanism and which accounts were compromised." }

